<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema de Ocorrências - Login</title>
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2><i class="fas fa-school"></i> Sistema de Ocorrências</h2>
            <form id="loginForm">
                <div class="input-group">
                    <label for="username"><i class="fas fa-user"></i> Usuário</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="empresa"><i class="fas fa-building"></i> Escola</label>
                    <select id="empresa" name="empresa_id">
                        <option value="">Selecione uma escola (opcional para super_admin)</option>
                    </select>
                </div>
                <button type="submit" class="btn-login">ENTRAR</button>
            </form>
            <a href="#" id="createUserLink" class="create-user-link">Criar novo usuário</a>
        </div>
    </div>
    <script src="js/login.js"></script>
</body>
</html>
