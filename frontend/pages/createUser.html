<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Criar Usuário - Sistema de Ocorrências</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <h2><i class="fas fa-user-plus"></i> Criar Novo Usuário</h2>
            <form id="createUserForm">
                <div class="input-group">
                    <label for="username"><i class="fas fa-user"></i> Username</label>
                    <input type="text" id="username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="password"><i class="fas fa-lock"></i> Senha</label>
                    <input type="password" id="password" name="password" required>
                </div>
                <div class="input-group">
                    <label for="empresa"><i class="fas fa-building"></i> Escola</label>
                    <select id="empresa" name="empresa_id" required>
                        <option value="">Selecione uma escola</option>
                    </select>
                </div>
                <button type="submit" class="btn-login">Criar Usuário</button>
            </form>
            <a href="../index.html" class="create-user-link">Voltar ao Login</a>
        </div>
    </div>
    <script src="../js/createUser.js"></script>
</body>
</html>
