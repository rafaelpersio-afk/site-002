<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sistema de Ocorrências</title>
    <link rel="stylesheet" href="../css/styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="sidebar">
        <h2><i class="fas fa-tachometer-alt"></i> Dashboard</h2>
        <ul>
            <li><a href="#ocorrencias" class="active">Minhas Ocorrências</a></li>
            <li><a href="#nova">Nova Ocorrência</a></li>
            <li><a href="#" onclick="logout()">Sair</a></li>
        </ul>
    </div>
    <div class="main-content">
        <div class="topbar">
            <h1>Minhas Ocorrências</h1>
        </div>
        <div id="ocorrencias" class="card">
            <div id="ocorrenciasList"></div>
        </div>
        <div id="nova" class="card">
            <h3><i class="fas fa-plus"></i> Nova Ocorrência</h3>
            <input type="text" id="aluno" placeholder="Nome do Aluno">
            <input type="text" id="turma" placeholder="Turma">
            <textarea id="descricao" placeholder="Descrição da Ocorrência"></textarea>
            <input type="date" id="data">
            <input type="time" id="hora">
            <button class="btn" onclick="criarOcorrencia()">Criar Ocorrência</button>
        </div>
    </div>
    <script src="../js/dashboard.js"></script>
</body>
</html>
